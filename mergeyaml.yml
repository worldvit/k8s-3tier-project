apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: himedia-3tier
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask
      tier: backend
  template:
    metadata:
      labels:
        app: flask
        tier: backend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - flask
            topologyKey: kubernetes.io/hostname
      containers:
      - args:
        - pip install flask pymysql && python /app/app.py
        command:
        - /bin/bash
        - -c
        env:
        - name: DB_HOST
          value: mysql-svc
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: ROOT_PASSWORD
              name: mysql-secret-7kf4494674
        - name: DB_NAME
          value: himedia
        image: python:3.9-slim
        lifecycle:
          preStop:
            exec:
              command:
              - sleep
              - "5"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        name: flask
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - mountPath: /app
          name: code-volume
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z mysql-svc 3306; do echo waiting for db; sleep 2; done;
        image: busybox:1.28
        name: wait-for-db
      volumes:
      - configMap:
          name: flask-config
        name: code-volume
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  namespace: himedia-3tier
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
      tier: frontend
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - nginx
            topologyKey: kubernetes.io/hostname
      containers:
      - image: nginx:alpine
        lifecycle:
          preStop:
            exec:
              command:
              - sleep
              - "5"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        name: nginx
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - mountPath: /etc/nginx/conf.d/default.conf
          name: frontend-vol
          subPath: default.conf
        - mountPath: /usr/share/nginx/html/index.html
          name: frontend-vol
          subPath: index.html
      volumes:
      - configMap:
          name: frontend-config
        name: frontend-vol
