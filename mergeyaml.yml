apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-sts
  namespace: himedia-3tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
      tier: database
  serviceName: mysql-svc
  template:
    metadata:
      labels:
        app: mysql
        tier: database
    spec:
      containers:
      - env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: ROOT_PASSWORD
              name: mysql-secret-7kf4494674
        - name: MYSQL_DATABASE
          value: himedia
        image: mysql:8.0
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -uroot
            - -pdkagh1.
          initialDelaySeconds: 30
          periodSeconds: 10
        name: mysql
        ports:
        - containerPort: 3306
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -uroot
            - -pdkagh1.
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - mountPath: /var/lib/mysql
          name: mysql-storage
        - mountPath: /docker-entrypoint-initdb.d
          name: init-script
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
      - configMap:
          name: mysql-init-config
        name: init-script
